{{ if .Values.app.local }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-world-configmap
  namespace: {{ .Values.app.name }}
  labels:
    app.kubernetes.io/instance: hello-world
data:
  "index.html": |-
    <!DOCTYPE html>
      <html lang="en">
        <head>
          <meta charset="utf-8">
          <title>Hello-App</title>
        </head>
          <body>
            <h1>Hello-App</h1>
            <br>
            <h2>
            Hello from '{{ .Values.app.name }}' on cluster '{{ .Values.app.cluster }}'
            </h2>
          </body>
      </html>

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-headers-configmap
  namespace: {{ .Values.app.name }}
  labels:
    app.kubernetes.io/instance: echo-headers
data:
  "server.py": |-
    import os
    from textwrap import dedent
    import http.server
    
    
    class PathTrackerHandler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            unknown = "unknown"
            ingress = self.headers.get("x-ingress", unknown)
            cluster = "{{ .Values.app.cluster }}"
            app = "{{ .Values.app.name }}"

            self.send_response(200)
            self.send_header("x-ingress", self.headers.get("x-ingress", unknown))
            self.send_header("x-app-location", cluster)
            self.send_header("x-app", app)
            self.end_headers()

            response_text = dedent(f"""\
            Request Ingress: {ingress}
            App Location: {cluster}
            App: {app}
            """)

            self.wfile.write(response_text.encode("utf-8"))


    if __name__ == "__main__":
        port = 8080
        address = ("0.0.0.0", port)
        httpd = http.server.HTTPServer(address, PathTrackerHandler)
        print(f"Starting path-tracker on {address[0]}:{port}...")
        httpd.serve_forever()

{{ end }}
