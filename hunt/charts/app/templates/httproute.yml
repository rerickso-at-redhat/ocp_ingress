apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-shared
  namespace: {{ .Values.name }}
spec:
  parentRefs:
  - name: anycast-gateway-shared
    namespace: anycast-gateways
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /{{ .Values.name }}
    backendRefs:
    - name: {{ .Values.name }}
      port: {{ .Values.httproute.port }}
    # For path-based routing, Apps that will respond to /app1, or rewrite the URL themselves will not need a rewrite
    # This hello app does not have an /app1 page so rewrite it to / which will pull the index
    filters:
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplaceFullPath
            replaceFullPath: /
      - type: RequestHeaderModifier
        requestHeaderModifier:
          add:
          - name: x-ingress
            value: {{ .Values.cluster }}
{{ if .Values.local }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-dedicated
  namespace: {{ .Values.name }}
spec:
  parentRefs:
  - name: anycast-gateway-dedicated-{{ .Values.name }}
    namespace: anycast-gateways
  rules:
  - backendRefs:
    - name: {{ .Values.name }}
      port: {{ .Values.httproute.port }}
{{ end }}
