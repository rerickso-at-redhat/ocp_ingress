{{ if .Values.app.local }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  labels:
    app: {{ .Values.app.name }}
  name: {{ .Values.app.name }}
  namespace: {{ .Values.app.namespace }}
spec:
  host: {{ .Values.app.route.host }}
  port:
    targetPort: {{ printf "%s-%s-listener" .Values.app.cluster .Values.app.name }} # Must match skupper listener service name
  to:
    kind: Service
    name: {{ .Values.app.name }}
    weight: 100
  wildcardPolicy: None
  tls:
    insecureEdgeTerminationPolicy: Allow
    termination: edge
{{ end }}
