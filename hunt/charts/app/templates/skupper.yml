# Always add a listener as the listener creates the application service
---
apiVersion: skupper.io/v2alpha1
kind: Listener
metadata:
  name: {{ .Values.app.name }}-listener
  namespace: {{ .Values.app.name }}
spec:
  routingKey: {{ .Values.app.name }}
  host: {{ .Values.app.name }}
  port: 8080
  type: tcp
...

# If the application is deployed locally to the cluster, a connector is required for incoming cross-cluster traffic and the site needs linkAccess to be default
{{ if .Values.app.local }}
---
apiVersion: skupper.io/v2alpha1
kind: Connector
metadata:
  generation: 1
  name: {{ .Values.app.name }}
  namespace: {{ .Values.app.name }}
spec:
  port: 8080
  routingKey: {{ .Values.app.name }}
  selector: app={{ .Values.app.name }}
  type: tcp
...
---
apiVersion: skupper.io/v2alpha1
kind: Site
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.app.namespace }}
spec:
  linkAccess: default
...

# If the application is not deployed locally, a connector is not required and the site needs linkAccess disabled
{{ else }}
---
apiVersion: skupper.io/v2alpha1
kind: Site
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.app.namespace }}
spec:
  linkAccess: none 
...
{{ end }}
