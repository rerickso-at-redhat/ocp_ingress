{{- range $.Values.metallb.ipaddresspools }}
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .name }}
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  addresses:
  - {{ .address | quote}}
  autoAssign: true
  avoidBuggyIPs: false
{{- end }}
