# DYNAMIC IP ADDRESS POOL
{{- with .Values.metallb.dynamic_ipaddresspool }}
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .name }}
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  addresses:
  - {{ .address | quote}}
  autoAssign: true
  avoidBuggyIPs: true
{{- end }}


# STATIC IP ADDRESS POOLS
{{- range $.Values.metallb.static_ipaddresspools }}
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .name }}
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  addresses:
  - {{ .address | quote}}
  autoAssign: true
  avoidBuggyIPs: false
{{- end }}
